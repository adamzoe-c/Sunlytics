<style>
:root{
  --orange:#f7971e;--orange-dark:#ff4e00;
  --navy:#1a1a1a;--gray:#6b7280;
  --white:#fff;--off:#f5f5f5;--border:#e8e8e8;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--white);color:var(--navy);min-height:100vh;display:flex;flex-direction:column;}

nav{display:flex;justify-content:space-between;align-items:center;padding:14px 5%;background:white;box-shadow:0 1px 20px rgba(0,0,0,0.07);position:sticky;top:0;z-index:200;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo img{width:34px;height:34px;object-fit:contain;}
.logo-text{font-size:18px;font-weight:800;letter-spacing:1px;background:linear-gradient(135deg,var(--orange),var(--orange-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;text-align:center;}
.wrap{max-width:560px;width:100%;}

/* Big 404 graphic */
.graphic{position:relative;margin:0 auto 40px;width:240px;height:160px;}
.num-4-left,.num-4-right,.num-0{
  position:absolute;font-size:100px;font-weight:900;line-height:1;
  background:linear-gradient(135deg,var(--orange),var(--orange-dark));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  user-select:none;
}
.num-4-left{left:0;top:0;}
.num-0{left:50%;transform:translateX(-50%);top:0;}
.num-4-right{right:0;top:0;}

/* drone SVG inside the 0 */
.drone-wrap{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-52%);
  animation:hover 3s ease-in-out infinite;
}
@keyframes hover{0%,100%{transform:translate(-50%,-52%);}50%{transform:translate(-50%,-60%);}}

.wrap h1{font-size:28px;font-weight:800;margin-bottom:12px;color:var(--navy);}
.wrap p{font-size:15px;color:var(--gray);line-height:1.7;margin-bottom:32px;}

.links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-primary{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--orange),var(--orange-dark));
  color:white;text-decoration:none;padding:13px 28px;
  border-radius:50px;font-size:15px;font-weight:700;
  box-shadow:0 4px 15px rgba(247,151,30,0.35);
  transition:all .2s;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(247,151,30,0.45);}
.btn-secondary{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--off);color:var(--navy);text-decoration:none;
  padding:13px 28px;border-radius:50px;font-size:15px;font-weight:600;
  border:1.5px solid var(--border);transition:all .2s;
}
.btn-secondary:hover{border-color:var(--orange);color:var(--orange);}

/* quick links */
.quick-links{margin-top:40px;padding-top:32px;border-top:1px solid var(--border);}
.quick-links p{font-size:13px;color:var(--gray);margin-bottom:16px;font-weight:500;}
.quick-grid{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.quick-link{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:10px;
  background:var(--off);color:var(--navy);text-decoration:none;
  font-size:13px;font-weight:500;border:1px solid var(--border);
  transition:all .2s;
}
.quick-link:hover{background:white;border-color:var(--orange);color:var(--orange);}

@media(max-width:480px){
  .graphic{width:190px;height:120px;}
  .num-4-left,.num-4-right,.num-0{font-size:78px;}
  .wrap h1{font-size:22px;}
  .links{flex-direction:column;align-items:center;}
  .btn-primary,.btn-secondary{width:100%;justify-content:center;}
}

footer{text-align:center;padding:20px;font-size:12px;color:var(--gray);}
footer a{color:var(--orange);text-decoration:none;}
</style>
</head>
