<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sunlytics Pro | Free Industrial Map</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .side-panel { transition: transform 0.3s ease; z-index: 2000; }
        @media (max-width: 768px) {
            .side-panel { transform: translateX(-100%); width: 85%; position: fixed; height: 100%; }
            .side-panel.active { transform: translateX(0); }
        }
        .search-bar { z-index: 1500; background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .result-card { padding: 20px; border-radius: 24px; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body class="overflow-hidden">

    <div class="search-bar absolute top-4 left-4 right-4 md:left-[440px] md:right-8 p-3 rounded-2xl flex gap-3 items-center">
        <button id="menuBtn" class="md:hidden p-2 bg-slate-100 rounded-lg">
            <svg class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <input type="text" id="locInput" placeholder="Search Company name or City in Latvia..." class="flex-1 bg-transparent border-none outline-none text-sm font-semibold text-slate-700">
        <button id="searchBtn" class="bg-orange-500 text-white px-5 py-2 rounded-xl text-xs font-bold uppercase tracking-wider">Find Site</button>
    </div>

    <div class="flex h-screen">
        <aside id="sidebar" class="side-panel w-[400px] bg-white border-r border-slate-200 flex flex-col p-6 shadow-xl">
            <div class="mb-8 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <img src="logo.png" alt="Logo" class="w-8 h-8">
                    <h1 class="text-xl font-black italic tracking-tighter text-slate-900">SUNLYTICS</h1>
                </div>
                <button id="closeBtn" class="md:hidden text-slate-400 text-2xl">✕</button>
            </div>

            <div class="flex-1 space-y-4 overflow-y-auto pr-2">
                <div class="bg-slate-900 p-6 rounded-3xl text-white">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Roof Area</p>
                    <div class="flex items-baseline gap-1">
                        <span id="areaDisplay" class="text-4xl font-bold">0</span>
                        <span class="text-orange-500 font-bold text-sm">m²</span>
                    </div>
                </div>

                <div id="resultsContent" class="space-y-3">
                    <div id="savingsCard" class="result-card bg-orange-50 hidden">
                        <p class="text-[9px] font-bold text-orange-600 uppercase tracking-widest mb-1">Estimated Savings</p>
                        <p id="savingsVal" class="text-2xl font-black text-slate-900">€0</p>
 </div>
                    <div id="placeholder" class="p-8 text-center border-2 border-dashed border-slate-200 rounded-3xl">
                        <p class="text-[11px] text-slate-400 font-medium italic">Draw a polygon over the industrial roof to start</p>
                    </div>
                </div>
            </div>

            <button onclick="window.print()" class="mt-6 w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-orange-600 shadow-lg transition">Download Report</button>
        </aside>

        <main class="flex-1 relative">
            <div id="map"></div>
        </main>
    </div>

    <script>
        // 1. Initializing Map (White Mode)
        var map = L.map('map', { zoomControl: false }).setView([56.9462, 24.1163], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        // 2. Drawing Tools
        var drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);
        var drawControl = new L.Control.Draw({
            position: 'topright',
            draw: {
                polygon: { shapeOptions: { color: '#f97316', weight: 2 } },
                rectangle: { shapeOptions: { color: '#f97316', weight: 2 } },
                circle: false, marker: false, polyline: false, circlemarker: false
            }
        });
        map.addControl(drawControl);

        // 3. Smart Search using Photon (No API Key Required)
        document.getElementById('searchBtn').onclick = function() {
            var query = document.getElementById('locInput').value;
            if(!query) return;

            // Photon API: Better at understanding landmarks and companies
            var url = 'https://photon.komoot.io/api/?q=' + encodeURIComponent(query) + '&lat=56.9&lon=24.1&limit=1';

            fetch(url)
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if(data.features.length > 0) {
                        var coords = data.features[0].geometry.coordinates;
                        map.setView([coords[1], coords[0]], 18); // Center and Zoom
                    } else {
                        alert("Site not found. Try street name or city.");
                    }
                });
        };

        // 4. Feasibility Calculations
        map.on(L.Draw.Event.CREATED, function (e) {
            drawnItems.clearLayers();
            var layer = e.layer;
            drawnItems.addLayer(layer);
            var area = turf.area(layer.toGeoJSON());
            
            // Logic
            document.getElementById('areaDisplay').innerText = Math.round(area).toLocaleString();
            var savings = Math.round((area / 6.8) * 1050 * 0.85 * 0.24);
            document.getElementById('savingsVal').innerText = '€' + savings.toLocaleString();
            
            // Show result
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('savingsCard').classList.remove('hidden');
            
            if(window.innerWidth < 768) document.getElementById('sidebar').classList.add('active');
        });

        // 5. Sidebar Toggle
        var sidebar = document.getElementById('sidebar');
        document.getElementById('menuBtn').onclick = function() { sidebar.classList.add('active'); };
        document.getElementById('closeBtn').onclick = function() { sidebar.classList.remove('active'); };
    </script>
</body>
</html>
